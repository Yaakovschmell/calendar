<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Dashboard Live</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Fishing Dashboard</h1>
    </header>
    <main>
        <section>
            <h2>Weather Information</h2>
            <div id="weather"></div>
        </section>
        <section>
            <h2>Tide Predictions</h2>
            <div id="tide-predictions"></div>
        </section>
        <section>
            <h2>Fishing Score Calculator</h2>
            <form id="score-calculator">
                <input type="number" id="catch-weight" placeholder="Catch Weight (lbs)" required>
                <button type="submit">Calculate Score</button>
                <p>Your Fishing Score: <span id="fishing-score"></span></p>
            </form>
        </section>
        <section>
            <h2>Calendar Functionality</h2>
            <div id="calendar"></div>
        </section>
        <section>
            <h2>Settings Panel</h2>
            <div id="settings-panel">
                <label for="units">Units:</label>
                <select id="units">
                    <option value="imperial">Imperial</option>
                    <option value="metric">Metric</option>
                </select>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Fishing Dashboard Live 🌊 🎣</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
