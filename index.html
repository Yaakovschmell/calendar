<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Wall Display</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter;
  background:#000;
  overflow:hidden;
}

/* BACKGROUND (SHARP, NO BLUR) */
#bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.75);
}

/* MAIN LAYOUT */
#container{
  display:flex;
  height:100vh;
  padding:50px;
  gap:40px;
  position:relative;
  z-index:10;
}

/* LEFT PANEL */
#left{
  width:35%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* CLOCK */
#clock{
  font-size:110px;
  font-weight:300;
  color:white;
}

#date{
  font-size:24px;
  color:rgba(255,255,255,0.8);
  margin-top:10px;
}

/* WEATHER PANEL */
#weather{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  color:white;
}

/* WEATHER TOP */
#weather-main{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#temp{
  font-size:60px;
}

#desc{
  font-size:18px;
  opacity:0.8;
}

/* WEATHER DETAILS GRID */
#weather-details{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  font-size:14px;
}

.detail{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}

/* RIGHT SIDE */
#right{
  flex:1;
  background:rgba(0,0,0,0.45);
  border-radius:25px;
  padding:30px;
  backdrop-filter:blur(15px);
  display:flex;
  flex-direction:column;
}

/* CALENDAR */
#month{
  font-size:30px;
  color:white;
  margin-bottom:20px;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  flex:1;
}

.day{
  color:white;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

.today{
  background:#f0c97a;
  color:black;
  font-weight:600;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="container">

  <div id="left">

    <div>
      <div id="clock"></div>
      <div id="date"></div>
    </div>

    <div id="weather">
      <div id="weather-main">
        <div id="temp">--°</div>
        <div id="desc">Loading...</div>
      </div>

      <div id="weather-details">
        <div class="detail">Wind: <span id="wind"></span></div>
        <div class="detail">Rain: <span id="rain"></span></div>
        <div class="detail">Pressure: <span id="pressure"></span></div>
        <div class="detail">Humidity: <span id="humidity"></span></div>
        <div class="detail">Feels: <span id="feels"></span></div>
        <div class="detail">Clouds: <span id="clouds"></span></div>
      </div>
    </div>

  </div>

  <div id="right">
    <div id="month"></div>
    <div id="calendar"></div>
  </div>

</div>

<script>

/* BACKGROUND IMAGE (HIGH QUALITY) */
document.getElementById("bg").style.backgroundImage =
"url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=3840')";

/* CLOCK */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("date").innerText =
    now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}
setInterval(updateClock,1000);
updateClock();

/* WEATHER (FULL DATA) */
fetch("https://api.open-meteo.com/v1/forecast?latitude=39.39&longitude=-76.78&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,pressure_msl,cloud_cover,wind_speed_10m")
.then(r=>r.json())
.then(d=>{
  const w = d.current;

  document.getElementById("temp").innerText = Math.round(w.temperature_2m)+"°";
  document.getElementById("desc").innerText = "Current";

  document.getElementById("wind").innerText = w.wind_speed_10m + " mph";
  document.getElementById("rain").innerText = w.precipitation + " mm";
  document.getElementById("pressure").innerText = w.pressure_msl + " hPa";
  document.getElementById("humidity").innerText = w.relative_humidity_2m + "%";
  document.getElementById("feels").innerText = w.apparent_temperature + "°";
  document.getElementById("clouds").innerText = w.cloud_cover + "%";
});

/* CALENDAR */
function renderCalendar(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById("month").innerText =
    now.toLocaleDateString([], {month:'long', year:'numeric'});

  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;

  for(let d=1; d<=days; d++){
    const cls = d===now.getDate() ? "day today" : "day";
    cal.innerHTML += `<div class="${cls}">${d}</div>`;
  }
}

renderCalendar();

</script>

</body>
</html>
