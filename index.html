<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Frame</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Inter; background:black; overflow:hidden; }

/* BACKGROUND */
#bg {
  position:fixed; inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(8px) brightness(0.6);
}

/* MAIN */
#container {
  display:flex;
  height:100vh;
  padding:60px;
  gap:60px;
  position:relative;
  z-index:10;
}

/* LEFT */
#left { flex:1; display:flex; flex-direction:column; justify-content:space-between; }

#clock { font-size:120px; color:white; }
#date { font-size:24px; color:rgba(255,255,255,0.8); }

/* WEATHER */
#temp { font-size:60px; color:white; }
#desc { color:rgba(255,255,255,0.7); }

/* RIGHT */
#right {
  width:55%;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:30px;
}

#month { font-size:30px; color:white; margin-bottom:20px; }

#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
}

.day {
  color:white;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

.today {
  background:#f0c97a;
  color:black;
  font-weight:600;
}

/* SETTINGS PANEL */
#settings {
  position:fixed;
  top:20px;
  right:20px;
  width:300px;
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:12px;
  color:white;
  display:none;
}

#settings input {
  width:100%;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="container">
  <div id="left">
    <div>
      <div id="clock"></div>
      <div id="date"></div>
    </div>
    <div>
      <div id="temp"></div>
      <div id="desc"></div>
    </div>
  </div>

  <div id="right">
    <div id="month"></div>
    <div id="calendar"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings">
  <h3>Settings</h3>

  <label>Photo URLs (comma separated)</label>
  <input id="photosInput">

  <label>Latitude</label>
  <input id="latInput">

  <label>Longitude</label>
  <input id="lonInput">

  <button onclick="saveSettings()">Save</button>
</div>

<script>

/* LOAD SETTINGS */
let settings = JSON.parse(localStorage.getItem("settings")) || {
  photos: [
    "https://lh3.googleusercontent.com/pw/AP1GczMmuMo-VlOqZN-wEgVF2XhCqZatam8NU8aK6LkURDLfLAPkQyfb0lIcrMFcBtfpC81fKjlB4gUQ_HqsaSZKncMIUlESIRiE5deumBUO4YB8dHilPWrz=w4096"
  ],
  lat: 39.39,
  lon: -76.78
};

/* SAVE */
function saveSettings(){
  settings.photos = document.getElementById("photosInput").value.split(",");
  settings.lat = document.getElementById("latInput").value;
  settings.lon = document.getElementById("lonInput").value;
  localStorage.setItem("settings", JSON.stringify(settings));
  location.reload();
}

/* TOGGLE SETTINGS */
document.addEventListener("keydown", (e)=>{
  if(e.key === "s"){
    const panel = document.getElementById("settings");
    panel.style.display = panel.style.display === "block" ? "none" : "block";

    document.getElementById("photosInput").value = settings.photos.join(",");
    document.getElementById("latInput").value = settings.lat;
    document.getElementById("lonInput").value = settings.lon;
  }
});

/* BACKGROUND */
let index = 0;
function changePhoto(){
  document.getElementById("bg").style.backgroundImage = `url(${settings.photos[index]})`;
  index = (index + 1) % settings.photos.length;
}
setInterval(changePhoto, 30000);
changePhoto();

/* CLOCK */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("date").innerText =
    now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}
setInterval(updateClock,1000);
updateClock();

/* WEATHER */
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${settings.lat}&longitude=${settings.lon}&current_weather=true`)
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText = Math.round(d.current_weather.temperature)+"°";
  document.getElementById("desc").innerText = "Current weather";
});

/* CALENDAR */
function renderCalendar(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById("month").innerText =
    now.toLocaleDateString([], {month:'long', year:'numeric'});

  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;

  for(let d=1; d<=days; d++){
    const cls = d===now.getDate() ? "day today" : "day";
    cal.innerHTML += `<div class="${cls}">${d}</div>`;
  }
}
renderCalendar();

</script>

</body>
</html>
