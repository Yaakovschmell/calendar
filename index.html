<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root {
  --overlay: rgba(0,0,0,0.28);
  --glass: rgba(0,0,0,0.18);
  --glass-light: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.13);
  --text: #ffffff;
  --accent: #f0c97a;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans', sans-serif; background:#000; overflow:hidden; color:white; }

#bg {
  position:fixed; inset:0;
  background-size:cover;
  background-position:center;
}
#bg::after {
  content:''; position:absolute; inset:0;
  background:var(--overlay);
}

#app {
  position:relative;
  display:grid;
  grid-template-columns:320px 1fr 300px;
  gap:15px;
  padding:20px;
  height:100vh;
  z-index:2;
}

.panel {
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-radius:16px;
  border:1px solid var(--border);
}

/* CLOCK */
#clock-block { padding:20px; }
#clock { font-size:80px; }
#date { font-size:14px; color:#ccc; }

/* WEATHER */
#weather { padding:15px; }
.stat { font-size:13px; margin:5px 0; }

/* CALENDAR */
#calendar {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day {
  padding:8px;
  background:var(--glass-light);
  border-radius:8px;
  font-size:11px;
}
.today {
  background:var(--accent);
  color:black;
}

/* RIGHT */
#fish, #tides { padding:15px; }

</style>
</head>

<body>

<div id="bg"></div>

<div id="app">

<!-- LEFT -->
<div class="panel" id="clock-block">
  <div id="clock"></div>
  <div id="date"></div>

  <div id="weather">
    <div id="temp"></div>
    <div class="stat">Wind: <span id="wind"></span></div>
    <div class="stat">Pressure: <span id="pressure"></span></div>
    <div class="stat">Humidity: <span id="humidity"></span></div>
  </div>
</div>

<!-- CENTER -->
<div class="panel">
  <div id="calendar"></div>
</div>

<!-- RIGHT -->
<div>
  <div class="panel" id="fish">
    Fishing Score: <span id="score">--</span>
  </div>

  <div class="panel" id="tides">
    <div id="tide"></div>
  </div>
</div>

</div>

<script>

/* CONFIG */
const CFG = {
  bg: "https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=3840",
  lat: 39.37,
  lon: -76.72,
  ical: "https://calendar.google.com/calendar/ical/aaronspero1%40gmail.com/private-fcf40194d406df57c8aaba1dbef1c70c/basic.ics"
};

const PROXY = "https://cors.isomorphic-git.org/";

/* BG */
document.getElementById("bg").style.backgroundImage = `url(${CFG.bg})`;

/* CLOCK */
setInterval(()=>{
  const d = new Date();
  clock.innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  date.innerText = d.toDateString();
},1000);

/* WEATHER */
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}&current=temperature_2m,wind_speed_10m,pressure_msl,relative_humidity_2m`)
.then(r=>r.json())
.then(d=>{
  temp.innerText = Math.round(d.current.temperature_2m)+"°";
  wind.innerText = d.current.wind_speed_10m+" mph";
  pressure.innerText = d.current.pressure_msl;
  humidity.innerText = d.current.relative_humidity_2m+"%";
});

/* TIDES */
fetch("https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=web_services&begin_date=today&end_date=today&datum=MLLW&station=8574680&time_zone=lst_ldt&units=english&interval=hilo&format=json")
.then(r=>r.json())
.then(d=>{
  tide.innerText = d.predictions[0].type==="H" ? "High Tide" : "Low Tide";
});

/* CALENDAR FIXED */
function parseICS(text){
  text = text.replace(/\r/g,'');
  let events=[];
  let current=null;

  text.split("\n").forEach(line=>{
    if(line==="BEGIN:VEVENT"){ current={}; }
    else if(line==="END:VEVENT"){
      if(current){
        if(!current.start && current.end){
          current.start = current.end;
        }
        events.push(current);
      }
    }
    else if(current){
      let idx = line.indexOf(":");
      if(idx===-1) return;

      let key = line.substring(0,idx);
      let val = line.substring(idx+1);

      if(key.startsWith("SUMMARY")){
        try { current.summary = decodeURIComponent(val); }
        catch { current.summary = val; }
      }

      if(key.startsWith("DTSTART")) current.start = val;
      if(key.startsWith("DTEND")) current.end = val;
    }
  });

  return events;
}

function loadCalendar(){
  fetch(PROXY + CFG.ical)
  .then(r=>r.text())
  .then(text=>{
    let events = parseICS(text);

    calendar.innerHTML="";

    let now=new Date();
    let year=now.getFullYear();
    let month=now.getMonth();

    let days=new Date(year,month+1,0).getDate();

    for(let i=1;i<=days;i++){
      let div=document.createElement("div");
      div.className="day";

      if(i===now.getDate()) div.classList.add("today");

      let ev=events.find(e=>e.start && e.start.includes(String(i).padStart(2,'0')));

      div.innerHTML = `<strong>${i}</strong><br>${ev?ev.summary:""}`;

      calendar.appendChild(div);
    }
  })
  .catch(()=>{
    console.log("Calendar sync failed");
  });
}

loadCalendar();

</script>

</body>
</html>
